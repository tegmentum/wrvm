name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: wrvm-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            asset: wrvm-aarch64-linux
          # Build x86_64-apple-darwin by cross-compiling from Apple Silicon
          # (macos-14). This avoids the macos-13 (Intel) runner queue, which
          # backlogs for hours in the public GitHub Actions pool. Rust's
          # macOS cross-target ships in `dtolnay/rust-toolchain@stable` via
          # the `targets:` input; no extra toolchain setup is needed.
          - target: x86_64-apple-darwin
            runner: macos-14
            asset: wrvm-x86_64-macos
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: wrvm-aarch64-macos
          # Windows: only x86_64 for now — GitHub Actions aarch64-windows
          # runners aren't consistently available in the public pool.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset: wrvm-x86_64-windows.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: build
        run: cargo build --release --target ${{ matrix.target }}
      - name: package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/wrvm ${{ matrix.asset }}
          if command -v sha256sum >/dev/null; then
            sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\wrvm.exe" "${{ matrix.asset }}"
          # Match the unix `sha256sum` format: `<hex>  <filename>` on one line.
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.asset }}").Hash.ToLower()
          "$hash  ${{ matrix.asset }}" | Out-File -Encoding ascii -NoNewline "${{ matrix.asset }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # After the release exists, download the four `.sha256` sidecars, patch
  # `Formula/wrvm.rb` with the new version + real hashes, and commit the
  # result to `main`. Uses the default `GITHUB_TOKEN` (workflow-level
  # `contents: write` above). `[skip ci]` keeps this docs-only patch from
  # re-triggering CI.
  update-formula:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Default `persist-credentials: true` keeps the token wired up for
          # the follow-up `git push`.
      - name: fetch sha256 sidecars
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p sha
          for asset in wrvm-x86_64-linux wrvm-aarch64-linux wrvm-x86_64-macos wrvm-aarch64-macos; do
            gh release download "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "${asset}.sha256" \
              --dir sha
          done
      - name: patch Formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Bump the version literal.
          sed -i "s|^  version \".*\"|  version \"${VERSION}\"|" Formula/wrvm.rb
          # For each asset, replace the sha256 line that follows the matching
          # url line. Each asset name appears only in its url line, so
          # `\|asset|{n;s|...|...|;}` unambiguously targets the next sha256.
          for asset in wrvm-x86_64-linux wrvm-aarch64-linux wrvm-x86_64-macos wrvm-aarch64-macos; do
            HASH="$(awk '{print $1}' "sha/${asset}.sha256")"
            sed -i "\|${asset}|{n;s|sha256 \"[^\"]*\"|sha256 \"${HASH}\"|;}" Formula/wrvm.rb
          done
          rm -rf sha
      - name: commit + push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Formula/wrvm.rb; then
            echo "Formula already up to date for ${GITHUB_REF_NAME}; nothing to commit."
            exit 0
          fi
          git add Formula/wrvm.rb
          git commit -m "chore: fill SHA256 values in Formula for ${GITHUB_REF_NAME} assets [skip ci]"
          git push origin HEAD:main
