name: mirror-wamr

# Build aarch64 WAMR runtime binaries from upstream source and publish them as a
# side-channel release on this repo, so wrvm can install WAMR on ARM hosts
# until upstream (bytecodealliance/wasm-micro-runtime) publishes aarch64
# assets.
#
# Trigger: manual (workflow_dispatch). WAMR cuts a release roughly every
# 6–12 months, so a scheduled trigger would be overkill; whoever bumps the
# mirror runs this by hand with the upstream tag as input.
#
# Publishes under the tag `wamr-mirror-<version>` (distinct from wrvm's own
# `v*` tags) so wrvm's install path can find it deterministically.
#
# Variants produced (aarch64-linux + aarch64-macos):
#   • iwasm            — plain interpreter/JIT runtime
#   • iwasm-gc-eh      — runtime with GC + Exception Handling proposals
#   • wamrc            — AOT compiler (needs LLVM; cached across runs)
#   • wasi-extensions  — headers + libs for embedding (built with wasi-sdk)

on:
  workflow_dispatch:
    inputs:
      wamr_version:
        description: 'Upstream WAMR version (e.g. 2.4.5)'
        required: true
        type: string

permissions:
  contents: write

env:
  WAMR_REPO: bytecodealliance/wasm-micro-runtime
  # Bump this when a newer wasi-sdk release becomes desirable. Asset names
  # are picked from the assets list per-runner, so only the tag matters.
  WASI_SDK_TAG: wasi-sdk-25

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            os_token: aarch64-ubuntu-24.04
            posix_dir: linux
            cores: nproc
          - runner: macos-14
            os_token: aarch64-macos-14
            posix_dir: darwin
            cores: sysctl -n hw.ncpu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: fetch WAMR source
        run: |
          git clone --depth 1 --branch WAMR-${{ inputs.wamr_version }} \
            https://github.com/${{ env.WAMR_REPO }}.git wamr

      # WAMR's wamr-compiler/build_llvm.sh needs `ccache` (LLVM cmake refuses
      # otherwise with LLVM_CCACHE_BUILD=ON) and `pip install requests`.
      # Both runners already have git, python3, cmake, make, and a C++ toolchain.
      - name: install build prereqs (linux)
        if: matrix.posix_dir == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: install build prereqs (macos)
        if: matrix.posix_dir == 'darwin'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install ccache
          # macOS Homebrew Python enforces PEP 668; build_llvm.sh runs a
          # `pip install -r requirements.txt` we need to let through.
          echo "PIP_BREAK_SYSTEM_PACKAGES=1" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # iwasm (plain)
      # ------------------------------------------------------------------
      - name: build iwasm (plain)
        working-directory: wamr/product-mini/platforms/${{ matrix.posix_dir }}
        run: |
          mkdir build && cd build
          cmake ..
          cmake --build . -j $(${{ matrix.cores }})
          test -x iwasm

      - name: package iwasm (plain)
        run: |
          ver=${{ inputs.wamr_version }}
          name=iwasm-${ver}-${{ matrix.os_token }}
          mkdir -p out/${name}
          cp wamr/product-mini/platforms/${{ matrix.posix_dir }}/build/iwasm out/${name}/iwasm
          cp wamr/LICENSE out/${name}/LICENSE || true
          tar -C out -czf ${name}.tar.gz ${name}
          rm -rf out

      # ------------------------------------------------------------------
      # iwasm-gc-eh
      # ------------------------------------------------------------------
      - name: build iwasm-gc-eh
        working-directory: wamr/product-mini/platforms/${{ matrix.posix_dir }}
        run: |
          rm -rf build
          mkdir build && cd build
          cmake -DWAMR_BUILD_GC=1 -DWAMR_BUILD_EXCE_HANDLING=1 ..
          cmake --build . -j $(${{ matrix.cores }})
          test -x iwasm

      - name: package iwasm-gc-eh
        run: |
          ver=${{ inputs.wamr_version }}
          name=iwasm-gc-eh-${ver}-${{ matrix.os_token }}
          mkdir -p out/${name}
          cp wamr/product-mini/platforms/${{ matrix.posix_dir }}/build/iwasm out/${name}/iwasm
          cp wamr/LICENSE out/${name}/LICENSE || true
          tar -C out -czf ${name}.tar.gz ${name}
          rm -rf out

      # ------------------------------------------------------------------
      # wamrc (AOT compiler)
      #
      # wamrc links against LLVM. WAMR ships `wamr-compiler/build_llvm.sh`
      # which clones LLVM into `core/deps/llvm` and builds it — expensive on
      # first run (~30 min), so we cache the built tree keyed on the WAMR
      # version + the build script's contents.
      # ------------------------------------------------------------------
      - name: hash LLVM build script
        id: llvm_key
        working-directory: wamr
        run: |
          if command -v sha256sum >/dev/null; then
            h=$(sha256sum wamr-compiler/build_llvm.sh | awk '{print $1}')
          else
            h=$(shasum -a 256 wamr-compiler/build_llvm.sh | awk '{print $1}')
          fi
          echo "hash=$h" >> "$GITHUB_OUTPUT"

      - name: cache LLVM
        id: llvm_cache
        uses: actions/cache@v4
        with:
          path: wamr/core/deps/llvm
          key: llvm-${{ matrix.os_token }}-wamr-${{ inputs.wamr_version }}-${{ steps.llvm_key.outputs.hash }}

      - name: build LLVM (if not cached)
        if: steps.llvm_cache.outputs.cache-hit != 'true'
        working-directory: wamr/wamr-compiler
        run: |
          ./build_llvm.sh

      # Explicitly persist the LLVM build even if a later step (wamrc, etc.)
      # fails — otherwise a failed run leaves nothing cached and the next run
      # pays the full 30-min LLVM cost again.
      - name: save LLVM cache
        if: always() && steps.llvm_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: wamr/core/deps/llvm
          key: ${{ steps.llvm_cache.outputs.cache-primary-key }}

      - name: build wamrc
        working-directory: wamr/wamr-compiler
        run: |
          mkdir -p build && cd build
          cmake ..
          cmake --build . -j $(${{ matrix.cores }})
          test -x wamrc

      - name: package wamrc
        run: |
          ver=${{ inputs.wamr_version }}
          name=wamrc-${ver}-${{ matrix.os_token }}
          mkdir -p out/${name}
          cp wamr/wamr-compiler/build/wamrc out/${name}/wamrc
          cp wamr/LICENSE out/${name}/LICENSE || true
          tar -C out -czf ${name}.tar.gz ${name}
          rm -rf out

      # ------------------------------------------------------------------
      # wasi-extensions
      #
      # This subproject's C sources include <wasi/api.h> from wasi-libc,
      # which only ships with wasi-sdk (a Clang cross-compiler targeting
      # WebAssembly). Install a matching wasi-sdk release, hand cmake the
      # bundled toolchain file, and package the install tree.
      # ------------------------------------------------------------------
      - name: install wasi-sdk
        run: |
          host_os=$(uname -s | tr '[:upper:]' '[:lower:]')
          host_arch=$(uname -m)
          case "$host_arch" in
            aarch64|arm64) host_arch=arm64 ;;
            x86_64) host_arch=x86_64 ;;
          esac
          case "$host_os" in
            darwin) sdk_os=macos ;;
            linux)  sdk_os=linux ;;
            *) echo "unsupported host os for wasi-sdk: $host_os" >&2; exit 1 ;;
          esac
          asset="${WASI_SDK_TAG}.0-${host_arch}-${sdk_os}.tar.gz"
          url="https://github.com/WebAssembly/wasi-sdk/releases/download/${WASI_SDK_TAG}/${asset}"
          echo "fetching $url"
          curl -fL "$url" -o wasi-sdk.tar.gz
          mkdir -p wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1
          echo "WASI_SDK_PATH=$PWD/wasi-sdk" >> "$GITHUB_ENV"

      - name: build wasi-extensions
        working-directory: wamr/wamr-wasi-extensions
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE="$WASI_SDK_PATH/share/cmake/wasi-sdk.cmake" \
                -DCMAKE_INSTALL_PREFIX=../install ..
          cmake --build . -j $(${{ matrix.cores }})
          cmake --install .

      - name: package wasi-extensions
        run: |
          ver=${{ inputs.wamr_version }}
          name=wasi-extensions-${ver}-${{ matrix.os_token }}
          mkdir -p out/${name}
          cp -R wamr/wamr-wasi-extensions/install/. out/${name}/
          cp wamr/LICENSE out/${name}/LICENSE || true
          tar -C out -czf ${name}.tar.gz ${name}
          rm -rf out

      # ------------------------------------------------------------------
      # Checksums + upload
      # ------------------------------------------------------------------
      - name: checksums
        run: |
          for f in *.tar.gz; do
            if command -v sha256sum >/dev/null; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wamr-mirror-${{ matrix.os_token }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: publish mirror release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wamr-mirror-${{ inputs.wamr_version }}
          name: WAMR ${{ inputs.wamr_version }} — aarch64 mirror
          # Not a wrvm-tool release — keep wrvm's own v* tags as "latest"
          # so /releases/latest returns the tool, not the mirror.
          make_latest: false
          body: |
            aarch64 builds of WAMR ${{ inputs.wamr_version }}, mirrored from
            upstream source at tag `WAMR-${{ inputs.wamr_version }}` because
            upstream publishes x86_64 assets only.

            Built variants: `iwasm` (plain), `iwasm-gc-eh` (GC + Exception
            Handling), `wamrc` (AOT compiler), `wasi-extensions` (headers +
            libs for embedding, built with wasi-sdk).

            wrvm resolves these automatically on aarch64 hosts; each asset
            ships with a `.sha256` sidecar that wrvm verifies on install.
          files: dist/*
